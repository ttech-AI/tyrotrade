name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # GitHub's official Pages template: queue runs, do NOT cancel an
  # in-progress one. cancel-in-progress=true backfired — killing a run
  # mid-deploy orphans its server-side Pages deployment in "in progress",
  # which then 400-blocks the next push ("due to in progress deployment").
  # Letting each deploy finish its poll cleanly avoids the orphan; the
  # remaining collisions are GitHub Pages' own server-side lag on the
  # custom domain, which clears on its own — just re-run/re-push.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # configure-pages reads this repo's Pages config — INCLUDING any
      # custom domain set in Settings → Pages — and outputs the correct
      # base_path / base_url / host. So the build auto-adapts:
      #   • *.github.io/tyrotrade  → base_path "/tyrotrade", host *.github.io
      #   • tyrotrade.ttech.business (custom domain, served at root)
      #                            → base_path "/",          host the domain
      # enablement:true also auto-turns-on Pages on first run.
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # GitHub Pages serves custom domains over https once the cert is
      # issued, but configure-pages `base_url` can report http:// before
      # HTTPS is enforced. MSAL redirect URIs are registered as https in
      # Azure → an http:// redirect URI triggers AADSTS50011. Force the
      # scheme to https, keep base_url's host + path, ensure one trailing /.
      - name: Resolve redirect URI (force https)
        id: redirect
        run: |
          url="${{ steps.pages.outputs.base_url }}"
          url="https://${url#*://}"
          echo "uri=${url%/}/" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          # Vite base path + MSAL redirect URI both follow whatever Pages
          # actually serves (configure-pages outputs). base_path is
          # "/tyrotrade" on a project site or "/" at a custom-domain root;
          # base_url is the full canonical URL. No hardcoding.
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          # SPA redirect URI = canonical Pages URL (https-forced) + slash.
          # Must be registered in the Azure AD app's SPA redirect URIs:
          #   https://ttech-ai.github.io/tyrotrade/   (github.io)
          #   https://tyrotrade.ttech.business/       (custom domain)
          VITE_AAD_REDIRECT_URI: ${{ steps.redirect.outputs.uri }}
          # Azure AD SPA app registration — TIRYAKI tenant.
          # Tenant + client IDs are not secrets (MSAL SPA flow exposes them
          # in the client bundle anyway), but we keep them in the workflow
          # so rotating means a single edit + push.
          VITE_USE_MOCK: "false"
          VITE_AAD_TENANT_ID: 9efa3bdf-67ad-47e3-8dfb-d1df79a6d7fa
          VITE_AAD_CLIENT_ID: 7d31868c-d0ef-452e-a5ac-4d42852649ec
          VITE_DATAVERSE_URL: https://operations-tiryaki.crm4.dynamics.com
          VITE_DATAVERSE_SCOPE: https://operations-tiryaki.crm4.dynamics.com/user_impersonation
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_VESSEL_WORKER_URL: https://noisy-smoke-b37a.pinarkrtnloglu.workers.dev
          VITE_COPILOT_CHAT_URL: https://copilotstudio.microsoft.com/environments/Default-9efa3bdf-67ad-47e3-8dfb-d1df79a6d7fa/bots/crfc1_tyroaioperations/webchat?__version__=2
          VITE_COPILOT_DIRECT_CONNECT_URL: https://default9efa3bdf67ad47e38dfbd1df79a6d7.fa.environment.api.powerplatform.com/copilotstudio/dataverse-backed/authenticated/bots/crfc1_tyroaioperations/conversations?api-version=2022-03-01-preview
          VITE_COPILOT_ENVIRONMENT_ID: Default-9efa3bdf-67ad-47e3-8dfb-d1df79a6d7fa
          VITE_COPILOT_BOT_SCHEMA: crfc1_tyroaioperations

      # Custom-domain deploys need a CNAME file in the artifact so Pages
      # keeps serving at that host (and doesn't reset the Settings value
      # on each Actions deploy). *.github.io hosts get NO CNAME — keeps
      # the TYROAIHUB project-site deploy unaffected.
      - name: Write CNAME for custom domain
        run: |
          host='${{ steps.pages.outputs.host }}'
          case "$host" in
            ''|*.github.io) echo "No custom domain ($host) — skip CNAME" ;;
            *) printf '%s\n' "$host" > dist/CNAME && echo "dist/CNAME = $host" ;;
          esac

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
